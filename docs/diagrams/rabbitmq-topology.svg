<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="760" viewBox="0 0 1520 760" role="img" aria-labelledby="title desc">
  <title id="title">RabbitMQ topology for Tiber notification delivery</title>
  <desc id="desc">API Service publishes notification jobs to a topic exchange. Jobs route by delivery channel to channel-specific delivery queues, retry queues, and dead-letter queues, then Worker Service consumes them.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3f4a5a"/>
    </marker>
    <style>
      .title { font: 700 26px Arial, sans-serif; fill: #172033; }
      .label { font: 700 16px Arial, sans-serif; fill: #172033; }
      .small { font: 13px Arial, sans-serif; fill: #41506a; }
      .tiny { font: 12px Arial, sans-serif; fill: #41506a; }
      .box { fill: #ffffff; stroke: #8792a2; stroke-width: 2; rx: 8; }
      .exchange { fill: #eaf4ff; stroke: #3a7bbf; stroke-width: 2; rx: 8; }
      .queue { fill: #f6fbf7; stroke: #3f8f5d; stroke-width: 2; rx: 8; }
      .retry { fill: #fff8e8; stroke: #bd7b1d; stroke-width: 2; rx: 8; }
      .dlq { fill: #fff1f1; stroke: #b95050; stroke-width: 2; rx: 8; }
      .worker { fill: #f2f0ff; stroke: #6554c0; stroke-width: 2; rx: 8; }
      .flow { fill: none; stroke: #3f4a5a; stroke-width: 2; marker-end: url(#arrow); }
      .retryflow { fill: none; stroke: #bd7b1d; stroke-width: 2; stroke-dasharray: 7 5; marker-end: url(#arrow); }
      .dlqflow { fill: none; stroke: #b95050; stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1520" height="760" fill="#ffffff"/>
  <text x="60" y="54" class="title">Tiber RabbitMQ Topology</text>
  <text x="60" y="82" class="small">Topic exchange routes durable notification jobs by channel. Retry queues handle operational backoff; DLQs preserve exhausted failures.</text>

  <rect x="60" y="140" width="180" height="86" class="box"/>
  <text x="150" y="174" text-anchor="middle" class="label">API Service</text>
  <text x="150" y="199" text-anchor="middle" class="small">publishes jobs</text>

  <rect x="330" y="132" width="250" height="102" class="exchange"/>
  <text x="455" y="169" text-anchor="middle" class="label">notifications.exchange</text>
  <text x="455" y="195" text-anchor="middle" class="small">topic exchange</text>
  <text x="455" y="216" text-anchor="middle" class="tiny">publisher confirms required</text>

  <rect x="1270" y="140" width="180" height="86" class="worker"/>
  <text x="1360" y="174" text-anchor="middle" class="label">Worker Service</text>
  <text x="1360" y="199" text-anchor="middle" class="small">consumes jobs</text>

  <path d="M240 183 H330" class="flow"/>

  <text x="690" y="124" class="label">Delivery Queues</text>
  <text x="895" y="124" class="label">Retry Queues</text>
  <text x="1102" y="124" class="label">Dead-Letter Queues</text>

  <g id="email-row">
    <text x="615" y="174" text-anchor="end" class="tiny">notification.email</text>
    <rect x="650" y="148" width="160" height="48" class="queue"/>
    <text x="730" y="177" text-anchor="middle" class="small">email.delivery.queue</text>
    <rect x="875" y="148" width="150" height="48" class="retry"/>
    <text x="950" y="177" text-anchor="middle" class="small">email.retry.queue</text>
    <rect x="1090" y="148" width="120" height="48" class="dlq"/>
    <text x="1150" y="177" text-anchor="middle" class="small">email.dlq</text>
  </g>

  <g id="push-row">
    <text x="615" y="254" text-anchor="end" class="tiny">notification.push</text>
    <rect x="650" y="228" width="160" height="48" class="queue"/>
    <text x="730" y="257" text-anchor="middle" class="small">push.delivery.queue</text>
    <rect x="875" y="228" width="150" height="48" class="retry"/>
    <text x="950" y="257" text-anchor="middle" class="small">push.retry.queue</text>
    <rect x="1090" y="228" width="120" height="48" class="dlq"/>
    <text x="1150" y="257" text-anchor="middle" class="small">push.dlq</text>
  </g>

  <g id="sms-row">
    <text x="615" y="334" text-anchor="end" class="tiny">notification.sms</text>
    <rect x="650" y="308" width="160" height="48" class="queue"/>
    <text x="730" y="337" text-anchor="middle" class="small">sms.delivery.queue</text>
    <rect x="875" y="308" width="150" height="48" class="retry"/>
    <text x="950" y="337" text-anchor="middle" class="small">sms.retry.queue</text>
    <rect x="1090" y="308" width="120" height="48" class="dlq"/>
    <text x="1150" y="337" text-anchor="middle" class="small">sms.dlq</text>
  </g>

  <g id="webhook-row">
    <text x="615" y="414" text-anchor="end" class="tiny">notification.webhook</text>
    <rect x="650" y="388" width="160" height="48" class="queue"/>
    <text x="730" y="417" text-anchor="middle" class="small">webhook.delivery.queue</text>
    <rect x="875" y="388" width="150" height="48" class="retry"/>
    <text x="950" y="417" text-anchor="middle" class="small">webhook.retry.queue</text>
    <rect x="1090" y="388" width="120" height="48" class="dlq"/>
    <text x="1150" y="417" text-anchor="middle" class="small">webhook.dlq</text>
  </g>

  <g id="in-app-row">
    <text x="615" y="494" text-anchor="end" class="tiny">notification.in_app</text>
    <rect x="650" y="468" width="160" height="48" class="queue"/>
    <text x="730" y="497" text-anchor="middle" class="small">in_app.delivery.queue</text>
    <rect x="875" y="468" width="150" height="48" class="retry"/>
    <text x="950" y="497" text-anchor="middle" class="small">in_app.retry.queue</text>
    <rect x="1090" y="468" width="120" height="48" class="dlq"/>
    <text x="1150" y="497" text-anchor="middle" class="small">in_app.dlq</text>
  </g>

  <path d="M580 183 C610 183 615 172 650 172" class="flow"/>
  <path d="M580 183 C615 183 615 252 650 252" class="flow"/>
  <path d="M580 183 C615 183 615 332 650 332" class="flow"/>
  <path d="M580 183 C615 183 615 412 650 412" class="flow"/>
  <path d="M580 183 C615 183 615 492 650 492" class="flow"/>

  <path d="M810 172 H875" class="retryflow"/>
  <path d="M810 252 H875" class="retryflow"/>
  <path d="M810 332 H875" class="retryflow"/>
  <path d="M810 412 H875" class="retryflow"/>
  <path d="M810 492 H875" class="retryflow"/>

  <path d="M1025 172 H1090" class="dlqflow"/>
  <path d="M1025 252 H1090" class="dlqflow"/>
  <path d="M1025 332 H1090" class="dlqflow"/>
  <path d="M1025 412 H1090" class="dlqflow"/>
  <path d="M1025 492 H1090" class="dlqflow"/>

  <path d="M650 196 C630 565 875 565 875 516" class="retryflow"/>
  <path d="M650 276 C635 585 875 585 875 516" class="retryflow"/>
  <path d="M650 356 C650 605 875 605 875 516" class="retryflow"/>
  <path d="M650 436 C690 625 875 625 875 516" class="retryflow"/>
  <path d="M875 492 C830 555 760 555 730 516" class="retryflow"/>

  <path d="M810 540 H1235 V183 H1270" class="flow"/>
  <text x="1022" y="566" text-anchor="middle" class="tiny">Worker consumes delivery queues</text>

  <rect x="60" y="610" width="570" height="80" class="box"/>
  <text x="84" y="640" class="label">Scheduling boundary</text>
  <text x="84" y="664" class="small">Business scheduling decisions are carried as payload metadata.</text>
  <text x="84" y="684" class="small">Retry queues are only for failed delivery backoff.</text>

  <rect x="700" y="610" width="640" height="80" class="box"/>
  <text x="724" y="640" class="label">Failure handling</text>
  <text x="724" y="664" class="small">Retry Manager increments payload attempt state and requeues with TTL.</text>
  <text x="724" y="684" class="small">After max attempts, jobs route to the channel-specific DLQ.</text>
</svg>
