openapi: 3.1.0

info:
  title: Tiber API
  version: 1.0.0
  summary: Tiber API v1
  description: |
    Intelligent production-grade notification platform.

    ## Authentication

    All protected endpoints require `Authorization: Bearer <token>`.
    They support two authentication mechanisms:

    - **API Keys** (`tb_xxxxx`): for client applications submitting notifications.
      Generated and scoped per project. Revocation is immediate.
    - **JWT access tokens**: for dashboard users and administrators.
      Short-lived (10 minutes). Refreshed via `/v1/auth/refresh`.

    The server verifies the token signature first. The Redis blocklist
    is checked only after a valid signature is confirmed. If Redis is
    unreachable, all authenticated requests fail with 503.

    ## Errors

    All errors follow a consistent format:

    ```json
    {
      "error": "not_found",
      "message": "Notification abc123 not found",
      "status": 404,
      "correlation_id": "a1b2..."
    }
    ```

    ## Pagination

    List endpoints use offset-based pagination:

    ```json
    {
      "data": [...],
      "meta": {
        "total": 142,
        "limit": 20,
        "offset": 0
      }
    }
    ```

    Cursor-based pagination is a documented future upgrade path.

    ## Idempotency

    `POST /v1/projects/{project_id}/notifications` accepts an optional
    `Idempotency-Key` header. Duplicate submissions with the same key
    within 24 hours return the original persisted 201 response,
    not a 409.

servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://api.tiber.dev
    description: Production

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: Authentication and token management
  - name: Projects
    description: Project management, the primary tenancy boundary
  - name: API Keys
    description: Project-scoped machine authentication keys
  - name: Templates
    description: Reusable notification content templates
  - name: Recipients
    description: Notification recipients and channel addresses
  - name: Preferences
    description: Recipient-level delivery preferences and quiet hours
  - name: Notifications
    description: Notification intake, status, and delivery history
  - name: Webhooks
    description: Outbound event callback endpoint registration
  - name: Delivery Policies
    description: Project-level delivery rules and compliance restrictions
  - name: Delivery Attempts
    description: Notification delivery attempt history and provider responses
  - name: Engagement Events
    description: Recipient engagement events (opens, clicks, etc.)
  - name: Observability
    description: Health checks and metrics

paths:
  # Auth

  /v1/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and obtain tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
      description: |
        Authenticates a dashboard user.
        Returns a short-lived access token and a refresh token.

  /v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh an access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
      description: |
        Accepts a refresh token and returns a new access and refresh token.
        The refresh token is rotated on each use. If the refresh
        token is revoked or expired, the request fails with 401.

  /v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout the current user
      description: |
        Revokes the current access token and refresh token immediately.
        Subsequent requests using either token are rejected
        even before the token's natural expiry.
      responses:
        "204":
          description: Token revoked
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/me:
    get:
      tags: [Auth]
      summary: Get the current user
      description: |
        Returns the profile of the currently authenticated dashboard user.
      responses:
        "200":
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # Projects

  /v1/projects:
    post:
      tags: [Projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
      description: |
        Creates a new project within the authenticated user's account.

    get:
      tags: [Projects]
      summary: List projects
      description: |
        Returns all projects within the authenticated user's account.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectList"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/projects/{project_id}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    get:
      tags: [Projects]
      summary: Get a project
      responses:
        "200":
          description: Project found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Projects]
      summary: Update a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

    delete:
      tags: [Projects]
      summary: Archive or permanently delete a project
      description: |
        Archives the project by default and prevents new notifications from being accepted.
        Existing delivery history, engagement events, and audit records are retained.

        To permanently delete a project, pass `?permanent=true`. This operation is irreversible,
        is only permitted when the project satisfies the server's deletion policy 
        (e.g, it contains no retained operational data), and deletes all 
        project-owned operational data.
      parameters:
        - name: permanent
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: |
            When `true`, permanently deletes the project instead of archiving it.
            If omitted or `false`, the project is archived.
      responses:
        "204":
          description: Project archived or permanently deleted
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: |
            The project cannot be deleted because it does not satisfy the server's
            deletion policy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # API Keys

  /v1/projects/{project_id}/api-keys:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    post:
      tags: [API Keys]
      summary: Create an API key
      description: |
        The raw key value (`tb_xxxxx`) is returned once in this response and never again.
        Tiber stores only a SHA-256 hash.
        Store the key securely immediately after creation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyRequest"
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyWithSecret"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

    get:
      tags: [API Keys]
      summary: List API keys
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: List of API keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyList"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{project_id}/api-keys/{key_id}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/KeyId"

    get:
      tags: [API Keys]
      summary: Get an API key
      responses:
        "200":
          description: API key found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKey"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [API Keys]
      summary: Revoke an API key
      description: >
        Revokes the API key immediately. Once revoked, the key can no
        longer be used to authenticate requests and cannot be reactivated.
      responses:
        "204":
          description: API key revoked
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # Templates

  /v1/projects/{project_id}/templates:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    post:
      tags: [Templates]
      summary: Create a template
      description: >
        Creates a reusable notification template
        for a specific delivery channel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateRequest"
      responses:
        "201":
          description: Template created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

    get:
      tags: [Templates]
      summary: List templates
      description: Returns templates belonging to the project.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: channel
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Channel"
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateList"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/projects/{project_id}/templates/{template_id}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/TemplateId"

    get:
      tags: [Templates]
      summary: Get a template
      responses:
        "200":
          description: Template found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Templates]
      summary: Update a template
      description: Slug is immutable after creation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTemplateRequest"
      responses:
        "200":
          description: Template updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

    delete:
      tags: [Templates]
      summary: Delete a Template
      description: |
        Permanently deletes the template.

        Existing notifications that were created from this template are unaffected,
        because rendered notification content is stored independently at creation time.
      responses:
        "204":
          description: Template deleted.
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # Recipients

  /v1/projects/{project_id}/recipients:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    post:
      tags: [Recipients]
      summary: Create a recipient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecipientRequest"
      responses:
        "201":
          description: Recipient created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipient"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

    get:
      tags: [Recipients]
      summary: List recipients
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: external_id
          in: query
          required: false
          description: >
            Filter recipients by an exact external identifier match.
          schema:
            type: string
      responses:
        "200":
          description: List of recipients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipientList"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/projects/{project_id}/recipients/{recipient_id}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/RecipientId"

    get:
      tags: [Recipients]
      summary: Get a recipient
      responses:
        "200":
          description: Recipient found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipient"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Recipients]
      summary: Update a recipient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRecipientRequest"
      responses:
        "200":
          description: Recipient updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipient"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

    delete:
      tags: [Recipients]
      summary: Archive or permanently delete a Recipient
      description: |
        Archives the recipient by default and prevents it from receiving new notifications.

        To permanently delete a recipient, pass `?permanent=true`. This operation is irreversible.
      parameters:
        - name: permanent
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: |
            When `true`, permanently deletes the recipient instead of archiving it.
            If omitted or `false`, the recipient is archived.
      responses:
        "204":
          description: Recipient archived or permanently deleted
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # User Preferences
  # Singleton per recipient, PUT upserts, no POST or list endpoint.

  /v1/projects/{project_id}/recipients/{recipient_id}/preferences:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/RecipientId"

    put:
      tags: [Preferences]
      summary: Upsert recipient preferences
      description: |
        Creates or fully replaces preferences for this recipient.
        Preferences are a singleton, there is no list endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertPreferencesRequest"
      responses:
        "200":
          description: Preferences saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreference"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

    get:
      tags: [Preferences]
      summary: Get recipient preferences
      responses:
        "200":
          description: Preferences found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreference"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Preferences]
      summary: Delete recipient preferences
      description: Resets the recipient to platform defaults.
      responses:
        "204":
          description: Preferences deleted.
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # Notifications

  /v1/projects/{project_id}/notifications:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    post:
      tags: [Notifications]
      summary: Send a notification
      description: |
        Accepts a notification request, runs idempotency check,
        resolves the template if provided, applies the Delivery Policy
        Resolver (user preferences → blackout dates → compliance), persists
        the notification and enqueues it for asynchronous processing.

        Supply `Idempotency-Key` to make client retries safe.
        Duplicate keys within 24 hours return the original 201 response.
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
            maxLength: 255
          description: Client-generated key for safe retries.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNotificationRequest"
      responses:
        "201":
          description: Notification accepted and enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    get:
      tags: [Notifications]
      summary: List notifications
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NotificationStatus"
        - name: channel
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Channel"
        - name: recipient_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationList"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/projects/{project_id}/notifications/{notification_id}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/NotificationId"

    get:
      tags: [Notifications]
      summary: Get a notification
      responses:
        "200":
          description: Notification found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{project_id}/notifications/{notification_id}/cancellation:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/NotificationId"

    put:
      tags: [Notifications]
      summary: Cancel a notification
      description: |
        Cancels a notification that has not yet been dispatched to a provider.

        Only notifications in a cancellable state (for example `pending` or
        `scheduled`) may be cancelled.

        Notifications that are already processing, delivered,
        failed, or previously cancelled cannot be cancelled.

      responses:
        "204":
          description: Notification cancelled
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: >
            The notification cannot be cancelled because it is no longer
            in a cancellable state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Delivery Attempts

  /v1/projects/{project_id}/notifications/{notification_id}/delivery-attempts:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/NotificationId"

    get:
      tags: [Delivery Attempts]
      summary: List delivery attempts
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      description: |
        Returns all delivery attempts for a notification in chronological order.
        Each attempt records the provider response, outcome, and any policy
        violation reason. This is the primary diagnostic surface for failed
        or delayed notifications.
      responses:
        "200":
          description: List of delivery attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryAttemptList"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/projects/{project_id}/notifications/{notification_id}/delivery-attempts/{attempt_id}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/NotificationId"
      - $ref: "#/components/parameters/AttemptId"

    get:
      tags: [Delivery Attempts]
      summary: Get a delivery attempt
      responses:
        "200":
          description: Delivery attempt found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryAttempt"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # Webhooks

  /v1/projects/{project_id}/webhooks:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    post:
      tags: [Webhooks]
      summary: Register a webhook endpoint
      description: |
        Registers an outbound callback URL that Tiber will call when
        subscribed notification lifecycle events occur. The Worker Service
        Webhook Dispatcher fires the callbacks — the API Service owns
        registration only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookRequest"
      responses:
        "201":
          description: Webhook endpoint registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEndpoint"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

    get:
      tags: [Webhooks]
      summary: List webhook endpoints
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: List of webhook endpoints
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEndpointList"

  /v1/projects/{project_id}/webhooks/{webhook_id}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/WebhookId"

    get:
      tags: [Webhooks]
      summary: Get a webhook endpoint
      responses:
        "200":
          description: Webhook endpoint found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEndpoint"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Webhooks]
      summary: Update a webhook endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWebhookRequest"
      responses:
        "200":
          description: Webhook endpoint updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEndpoint"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

    delete:
      tags: [Webhooks]
      summary: Delete a webhook endpoint
      responses:
        "204":
          description: Webhook endpoint deleted
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{project_id}/webhooks/{webhook_id}/events:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/WebhookId"

    get:
      tags: [Webhooks]
      summary: List webhook delivery events
      description: |
        Returns the delivery history of outbound callbacks for this endpoint.
        Each event records the HTTP response code, outcome, and attempt number.
        Useful for diagnosing failed webhook deliveries independently
        of notification delivery outcomes.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/WebhookEventStatus"
      responses:
        "200":
          description: List of webhook delivery events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEventList"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # Delivery Policy
  # Singleton per project — PUT upserts, no POST or list endpoint.

  /v1/projects/{project_id}/delivery-policy:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    put:
      tags: [Delivery Policy]
      summary: Upsert delivery policy
      description: |
        Creates or fully replaces the delivery policy for this project.
        A project has at most one delivery policy.

        Constraints are evaluated in order at notification intake:
        1. User preferences (soft — adjusts send time)
        2. Blackout periods (soft — pushes past the blackout)
        3. Compliance restrictions (hard — rejects the notification)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertDeliveryPolicyRequest"
      responses:
        "200":
          description: Delivery policy saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryPolicy"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

    get:
      tags: [Delivery Policy]
      summary: Get delivery policy
      responses:
        "200":
          description: Delivery policy found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryPolicy"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Delivery Policy]
      summary: Delete delivery policy
      description: |
        Deletes the project's delivery policy.

        Subsequent notifications are evaluated using Tiber's default delivery
        behavior until a new project delivery policy is configured.
      responses:
        "204":
          description: Delivery policy deleted
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # Engagement Events

  /v1/projects/{project_id}/engagement-events:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    get:
      tags: [Engagement Events]
      operationId: listProjectEngagementEvents
      summary: List engagement events
      description: |
        Returns engagement events recorded across all notifications within
        the project. This endpoint is intended for analytics, reporting,
        and auditing engagement activity.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: event_type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EngagementEventType"
        - name: recipient_id
          in: query
          required: false
          schema:
            $ref: "#/components/parameters/RecipientId"
        - name: notification_id
          in: query
          required: false
          schema:
            $ref: "#/components/parameters/NotificationId"
        - name: channel
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Channel"
        - name: occurred_after
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
        - name: occurred_before
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
      responses:
        "200":
          description: Paginated list of engagement events.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementEventList"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{project_id}/engagement-events/{event_id}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/EngagementEventId"

    get:
      tags: [Engagement Events]
      operationId: getEngagementEvent
      summary: Get an engagement event
      description: |
        Returns a single engagement event recorded for the project.
      responses:
        "200":
          description: Engagement event found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementEvent"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{project_id}/notifications/{notification_id}/engagement-events:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/NotificationId"

    get:
      tags: [Engagement Events]
      summary: List engagement events for a notification
      description: |
        Returns all engagement events recorded for a specific notification.
        Events are reported by the delivery provider and recorded by Tiber
        after the notification has been delivered.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: event_type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EngagementEventType"
      responses:
        "200":
          description: Paginated list of engagement events for this notification.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementEventList"
        "403":
          $ref: "#/components/responses/Forbidden"

  # Observability

  /health:
    get:
      tags: [Observability]
      summary: Service health check
      security: []
      description: |
        Checks live connectivity for Postgres, Redis, and RabbitMQ.
        Redis failure is reported as `unhealthy` (not degraded) because
        authentication fails closed when Redis is unreachable, the
        service is effectively down for authenticated requests.
      responses:
        "200":
          description: All dependencies healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: One or more dependencies unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /metrics:
    get:
      tags: [Observability]
      summary: Prometheus metrics
      security: []
      description: |
        Exposes Prometheus metrics for internal monitoring.
        This endpoint is intended for infrastructure use and should
        not be publicly accessible.
      responses:
        "200":
          description: Prometheus-format metrics
          content:
            text/plain:
              schema:
                type: string

# Components

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        `Authorization: Bearer <token>` scheme supports two authentication mechanisms:
        - **API Keys** (`tb_xxxxx`) for client applications
        - **JWT access tokens** for dashboard users

  # Parameters

  parameters:
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/UUID"

    AttemptId:
      name: attempt_id
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/UUID"

    EngagementEventId:
      name: event_id
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/UUID"

    KeyId:
      name: key_id
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/UUID"

    TemplateId:
      name: template_id
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/UUID"

    RecipientId:
      name: recipient_id
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/UUID"

    NotificationId:
      name: notification_id
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/UUID"

    WebhookId:
      name: webhook_id
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/UUID"

    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0

  # Reusable responses

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: not_found
            message: Notification abc123 not found
            status: 404

    Unauthorized:
      description: Authentication failed or token revoked
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: unauthorized
            message: Invalid or expired token
            status: 401

    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: conflict
            message: A project with this slug already exists
            status: 409

    UnprocessableEntity:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"
          example:
            error: validation_error
            message: Request validation failed
            status: 422
            details:
              - field: channel
                message: Value must be one of email, push, sms, webhook, in_app

    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: rate_limit_exceeded
            message: Too many requests. Retry after 60 seconds.
            status: 429

    Forbidden:
      description: Access denied
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: forbidden
            message: You do not have permission to access this resource
            status: 403

  # Schemas

  schemas:
    # Shared

    Timestamp:
      type: string
      format: date-time

    UUID:
      type: string
      format: uuid

    ErrorResponse:
      type: object
      required: [error, message, status, correlation_id]
      properties:
        error:
          type: string
          example: not_found
        message:
          type: string
          example: Notification abc123 not found
        status:
          type: integer
          example: 404
        correlation_id:
          $ref: "#/components/schemas/UUID"
          description: Correlation identifier that can be supplied to support teams for debugging.

    ValidationErrorResponse:
      type: object
      required: [error, message, status, details]
      properties:
        error:
          type: string
          example: validation_error
        message:
          type: string
          example: Request validation failed
        status:
          type: integer
          example: 422
        details:
          type: array
          items:
            type: object
            required: [field, message]
            properties:
              field:
                type: string
                example: channel
              message:
                type: string
                example: Value must be one of email, push, sms, webhook, in_app

    PaginationMeta:
      type: object
      required: [total, limit, offset]
      properties:
        total:
          type: integer
          description: Total number of matching resources
          example: 142
        limit:
          type: integer
          example: 20
        offset:
          type: integer
          example: 0

    Channel:
      type: string
      enum: [email, push, sms, webhook, in_app]

    NotificationStatus:
      type: string
      description: |
        The current lifecycle state of the notification.

        - `pending` — Accepted by the API and persisted. Awaiting scheduling
          or worker pickup.
        - `scheduled` — Waiting until the scheduled delivery time.
        - `processing` — Currently being processed by a worker. Delivery
          cancellation is no longer permitted.
        - `delivered` — Successfully dispatched to the provider.
        - `failed` — Processing or delivery failed after all retry attempts.
        - `policy_rejected` — Delivery was intentionally blocked by the
          project's delivery policy.
        - `cancelled` — Cancelled before processing began.
      enum:
        - pending
        - scheduled
        - processing
        - delivered
        - failed
        - policy_rejected
        - cancelled

    DeliveryAttemptStatus:
      type: string
      enum: [succeeded, failed, policy_rejected]

    WebhookEventStatus:
      type: string
      enum: [delivered, failed]

    TimeWindow:
      type: object
      required: [start, end]
      properties:
        start:
          type: string
          pattern: '^([01]\d|2[0-3]):([0-5]\d)$'
          description: HH:MM in 24-hour format
          example: "09:00"
        end:
          type: string
          pattern: '^([01]\d|2[0-3]):([0-5]\d)$'
          example: "17:00"

    Provider:
      type: string
      enum:
        - resend
        - sendgrid
        - fcm
        - mock

    UserRole:
      type: string
      enum: [admin, user]

    # Auth

    User:
      type: object
      required: [id, email, role, created_at, updated_at]
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        email:
          type: string
          format: email
        name:
          type: string
          nullable: true
        created_at:
          $ref: "#/components/schemas/Timestamp"
        updated_at:
          $ref: "#/components/schemas/Timestamp"
        role:
          $ref: "#/components/schemas/UserRole"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    TokenResponse:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          description: Access token lifetime in seconds
          example: 900

    # Project

    Project:
      type: object
      required: [id, name, slug, archived, created_at, updated_at]
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        name:
          type: string
          example: My Application
        slug:
          type: string
          example: my-application
          description: Immutable after creation.
        description:
          type: string
          nullable: true
        archived:
          type: boolean
          description: >
            Indicates whether the project is archived. Archived projects
            remain accessible for historical data but cannot accept new
            notifications or other mutating operations.
        created_at:
          $ref: "#/components/schemas/Timestamp"
        updated_at:
          $ref: "#/components/schemas/Timestamp"
        archived_at:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"

    CreateProjectRequest:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        slug:
          type: string
          minLength: 1
          maxLength: 100
          pattern: "^[a-z0-9-]+$"
          description: URL-safe lowercase identifier. Immutable after creation.
        description:
          type: string
          maxLength: 500

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 500
          nullable: true

    ProjectList:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    # API Key

    APIKey:
      type: object
      required: [id, project_id, name, prefix, revoked, created_at]
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        project_id:
          $ref: "#/components/schemas/UUID"
        name:
          type: string
          example: Production API Key
        prefix:
          type: string
          description: >
            Non-sensitive prefix of the API key used to identify
            the key in dashboards and audit logs.
          example: tb_abc123
        revoked:
          type: boolean
          description: Indicates whether the API key has been revoked.
        last_used_at:
          $ref: "#/components/schemas/Timestamp"
          nullable: true
        created_at:
          $ref: "#/components/schemas/Timestamp"
        revoked_at:
          $ref: "#/components/schemas/Timestamp"
          nullable: true
        expires_at:
          $ref: "#/components/schemas/Timestamp"
          nullable: true

    APIKeyWithSecret:
      allOf:
        - $ref: "#/components/schemas/APIKey"
        - type: object
          required: [key]
          properties:
            key:
              type: string
              description: Full API key value. Shown once, store it securely.
              example: tb_abc123def456ghi789jkl012mno345pqr678stu901vwx

    CreateAPIKeyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100

    APIKeyList:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/APIKey"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    # Template

    Template:
      type: object
      required:
        [id, project_id, name, slug, channel, body, created_at, updated_at]
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        project_id:
          $ref: "#/components/schemas/UUID"
        name:
          type: string
        slug:
          type: string
          description: Immutable after creation.
        channel:
          $ref: "#/components/schemas/Channel"
        subject:
          type: string
          nullable: true
          description: Supports {{variable}} interpolation.
        body:
          type: string
          description: Supports {{variable}} interpolation.
        created_at:
          $ref: "#/components/schemas/Timestamp"
        updated_at:
          $ref: "#/components/schemas/Timestamp"

    CreateTemplateRequest:
      type: object
      required: [name, slug, channel, body]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        slug:
          type: string
          minLength: 1
          maxLength: 100
          pattern: "^[a-z0-9-]+$"
        channel:
          $ref: "#/components/schemas/Channel"
        subject:
          type: string
          maxLength: 500
        body:
          type: string

    UpdateTemplateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        subject:
          type: string
          nullable: true
        body:
          type: string

    TemplateList:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Template"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    # Recipient

    RecipientChannels:
      type: object
      description: |
        Channel-specific addressing. At least one address must be provided.
        Addresses are used during delivery based on the notification channel.
      properties:
        email:
          type: array
          items:
            type: string
            format: email
        sms:
          type: array
          items:
            type: string
            example: "+2348012345678"
        push:
          type: array
          items:
            type: string
            description: FCM push token.
        webhook:
          type: array
          items:
            type: string
            format: uri
      anyOf:
        - required: [email]
        - required: [sms]
        - required: [push]
        - required: [webhook]

    Recipient:
      type: object
      required: [id, project_id, channels, archived, created_at, updated_at]
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        project_id:
          $ref: "#/components/schemas/UUID"
        external_id:
          type: string
          nullable: true
          description: Your system's stable identifier for this recipient.
        name:
          type: string
          nullable: true
        channels:
          $ref: "#/components/schemas/RecipientChannels"
        archived:
          type: boolean
          description: Indicates whether the recipient is archived.
        created_at:
          $ref: "#/components/schemas/Timestamp"
        updated_at:
          $ref: "#/components/schemas/Timestamp"

    CreateRecipientRequest:
      type: object
      required: [name, channels]
      properties:
        external_id:
          type: string
          maxLength: 255
        name:
          type: string
          minLength: 1
          maxLength: 200
        channels:
          $ref: "#/components/schemas/RecipientChannels"

    UpdateRecipientRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        channels:
          $ref: "#/components/schemas/RecipientChannels"

    RecipientList:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Recipient"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    # User Preference

    UserPreference:
      type: object
      required:
        [
          recipient_id,
          project_id,
          preferred_channels,
          opted_out_channels,
          timezone,
          updated_at,
        ]
      properties:
        recipient_id:
          $ref: "#/components/schemas/UUID"
        project_id:
          $ref: "#/components/schemas/UUID"
        preferred_channels:
          type: array
          items:
            $ref: "#/components/schemas/Channel"
          uniqueItems: true
          description: |
            Ordered preference. 
            First channel is tried first.
        opted_out_channels:
          type: array
          items:
            $ref: "#/components/schemas/Channel"
          uniqueItems: true
          description: |
            Channels this recipient has opted out of entirely.
            Explicit opt-out takes precedence over preferred channels.
        quiet_hours:
          allOf:
            - $ref: "#/components/schemas/TimeWindow"
          nullable: true
          description: |
            No notifications during this window. Notifications are
            rescheduled to after the window ends, not dropped.
        delivery_window:
          allOf:
            - $ref: "#/components/schemas/TimeWindow"
          nullable: true
          description: Notifications are only dispatched within this window.
        timezone:
          type: string
          example: Africa/Lagos
          description: IANA timezone for quiet hours and delivery window evaluation.
        updated_at:
          $ref: "#/components/schemas/Timestamp"

    UpsertPreferencesRequest:
      type: object
      required: [preferred_channels, opted_out_channels, timezone]
      properties:
        preferred_channels:
          type: array
          items:
            $ref: "#/components/schemas/Channel"
        opted_out_channels:
          type: array
          items:
            $ref: "#/components/schemas/Channel"
        quiet_hours:
          allOf:
            - $ref: "#/components/schemas/TimeWindow"
          nullable: true
        delivery_window:
          allOf:
            - $ref: "#/components/schemas/TimeWindow"
          nullable: true
        timezone:
          type: string
          example: Africa/Lagos
          nullable: true
          description: May be `null` only when both `quiet_hours` and `delivery_window` are `null`.

    # Notification

    NotificationContent:
      type: object
      required: [body]
      properties:
        subject:
          type: string
          description: |
            Used by email-capable channels only.
            Ignored for channels that do not support subjects.
          nullable: true
        body:
          type: string

    NotificationIntelligence:
      type: object
      description: ML predictions attached by the API Service at intake.
      properties:
        priority:
          type: string
          enum: [low, medium, high]
        channel_preference:
          $ref: "#/components/schemas/Channel"
        send_time_basis:
          type: string
          enum: [explicit, ml_predicted, immediate]
        model_versions:
          type: object
          additionalProperties:
            type: string
          example:
            priority_classifier: priority-2026-01-01.1
            send_time_optimizer: send-time-2026-01-01.1
        confidence:
          type: object
          additionalProperties:
            type: number
          example:
            priority: 0.91
            send_time: 0.74

    Notification:
      type: object
      required:
        [
          id,
          project_id,
          recipient_id,
          channel,
          status,
          content,
          correlation_id,
          created_at,
          updated_at,
        ]
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        project_id:
          $ref: "#/components/schemas/UUID"
        recipient_id:
          $ref: "#/components/schemas/UUID"
        channel:
          $ref: "#/components/schemas/Channel"
        status:
          $ref: "#/components/schemas/NotificationStatus"
        content:
          $ref: "#/components/schemas/NotificationContent"
        template_id:
          $ref: "#/components/schemas/UUID"
          nullable: true
        idempotency_key:
          type: string
          readOnly: true
          nullable: true
        correlation_id:
          $ref: "#/components/schemas/UUID"
          description: |
            Trace ID propagated through all pipeline logs, the job payload,
            delivery attempts, and webhook events. Use this to correlate
            a notification's full lifecycle across services.
        scheduled_at:
          $ref: "#/components/schemas/Timestamp"
          nullable: true
        delivered_at:
          $ref: "#/components/schemas/Timestamp"
          nullable: true
        created_at:
          $ref: "#/components/schemas/Timestamp"
        updated_at:
          $ref: "#/components/schemas/Timestamp"

    CreateNotificationRequest:
      type: object
      required: [recipient_id, channel]
      properties:
        recipient_id:
          $ref: "#/components/schemas/UUID"
        channel:
          $ref: "#/components/schemas/Channel"
        template_id:
          $ref: "#/components/schemas/UUID"
          nullable: true
          description: |
            Reference an existing template. Mutually exclusive with providing
            content directly. If both are given, an error is raised.
        template_variables:
          type: object
          additionalProperties:
            type: string
          description: Variables interpolated into the template at render time.
        content:
          $ref: "#/components/schemas/NotificationContent"
          description: Required when template_id is not provided.
        scheduled_at:
          $ref: "#/components/schemas/Timestamp"
          nullable: true
          description: |
            Explicit send time in UTC. If omitted, the ML Send-Time Predictor
            determines the optimal time based on recipient engagement history,
            or sends immediately if no prediction is available.

    NotificationList:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    # Delivery Attempt

    DeliveryAttempt:
      type: object
      required:
        [
          id,
          notification_id,
          attempt_number,
          status,
          channel,
          provider,
          created_at,
        ]
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        notification_id:
          $ref: "#/components/schemas/UUID"
        attempt_number:
          type: integer
          minimum: 1
        status:
          $ref: "#/components/schemas/DeliveryAttemptStatus"
        channel:
          $ref: "#/components/schemas/Channel"
        provider:
          $ref: "#/components/schemas/Provider"
          example: resend
        provider_message_id:
          type: string
          nullable: true
          description: |
            The provider's own reference ID for this message.
            Use this to cross-reference with provider logs or support.
            Null on failed attempts.
        error_code:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true
        policy_violation_reason:
          type: string
          nullable: true
          description: Set when status is policy_rejected.
        latency_ms:
          type: integer
          format: int32
          nullable: true
        created_at:
          $ref: "#/components/schemas/Timestamp"

    DeliveryAttemptList:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DeliveryAttempt"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    # Engagement Event

    EngagementEventType:
      type: string
      enum:
        - delivered
        - opened
        - clicked
        - bounced
        - complained
        - unsubscribed

    EngagementEvent:
      type: object
      required:
        [
          id,
          project_id,
          notification_id,
          recipient_id,
          event_type,
          channel,
          provider,
          created_at,
          occurred_at,
        ]
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        project_id:
          $ref: "#/components/schemas/UUID"
        notification_id:
          $ref: "#/components/schemas/UUID"
        recipient_id:
          $ref: "#/components/schemas/UUID"
        event_type:
          $ref: "#/components/schemas/EngagementEventType"
        channel:
          $ref: "#/components/schemas/Channel"
        provider:
          $ref: "#/components/schemas/Provider"
          description: The provider that reported this engagement event
        metadata:
          type: object
          additionalProperties: true
          description: |
            Provider-specific event payload.
          example: |
            ip_address: "192.168.1.5"
            user_agent: Mozilla/5.0
            link: "https://example.com/reset-password"
        created_at:
          $ref: "#/components/schemas/Timestamp"
        occurred_at:
          $ref: "#/components/schemas/Timestamp"

    EngagementEventList:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/EngagementEvent"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    # Webhook Endpoint

    WebhookEventType:
      type: string
      enum:
        - notification.delivered
        - notification.failed
        - notification.policy_rejected
        - notification.cancelled

    WebhookEndpoint:
      type: object
      required:
        [
          id,
          project_id,
          url,
          events,
          secret_prefix,
          archived,
          created_at,
          updated_at,
        ]
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        project_id:
          $ref: "#/components/schemas/UUID"
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            $ref: "#/components/schemas/WebhookEventType"
        secret_prefix:
          type: string
          description: Prefix of the webhook signing secret.
        archived:
          type: boolean
        created_at:
          $ref: "#/components/schemas/Timestamp"
        updated_at:
          $ref: "#/components/schemas/Timestamp"

    CreateWebhookRequest:
      type: object
      required: [url, events]
      properties:
        url:
          type: string
          format: uri
        events:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/WebhookEventType"

    UpdateWebhookRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
        events:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/WebhookEventType"
        is_active:
          type: boolean

    WebhookEndpointList:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/WebhookEndpoint"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    CreateWebhookResponse:
      allOf:
        - $ref: "#/components/schemas/WebhookEndpoint"
        - type: object
          required: [secret]
          properties:
            secret:
              type: string
              description: >
                Shown only once. Store securely.

    # Webhook Delivery Event

    WebhookDeliveryEvent:
      type: object
      required:
        [
          id,
          endpoint_id,
          notification_id,
          event_type,
          status,
          attempt_number,
          created_at,
        ]
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        endpoint_id:
          $ref: "#/components/schemas/UUID"
          nullable: true
        endpoint_url:
          type: string
          format: uri
          description: Snapshot of the endpoint URL used when this webhook was dispatched.
        notification_id:
          $ref: "#/components/schemas/UUID"
        event_type:
          $ref: "#/components/schemas/WebhookEventType"
        status:
          $ref: "#/components/schemas/WebhookEventStatus"
        response_status_code:
          type: integer
          nullable: true
          description: |
            HTTP status code returned by the webhook endpoint.
            Null if no HTTP response was received (for example, connection failure or timeout)
          example: 200
        error:
          type: string
          nullable: true
          description: |
            Human-readable error describing why delivery failed.
            Null when the webhook delivery succeeded
        attempt_number:
          type: integer
          minimum: 1
        created_at:
          $ref: "#/components/schemas/Timestamp"

    WebhookEventList:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/WebhookDeliveryEvent"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    # Delivery Policy

    BlackoutPeriod:
      type: object
      required: [name, start_date, end_date]
      description: |
        Calendar dates during which notifications are not dispatched.
        Dates are interpreted in UTC.
      properties:
        name:
          type: string
          example: Christmas Holiday
        start_date:
          type: string
          format: date
          example: "2026-12-24"
        end_date:
          type: string
          format: date
          example: "2026-12-26"

    ComplianceRule:
      type: object
      required: [name, allowed_window]
      properties:
        name:
          type: string
          example: Financial Services Communication Window
        description:
          type: string
          example: SMS prohibited after 8PM
        allowed_window:
          $ref: "#/components/schemas/TimeWindow"
        channels:
          type: array
          items:
            $ref: "#/components/schemas/Channel"
          description: |
            Channels this rule applies to.
            Empty array means the rule applies to all channels.

    DeliveryPolicy:
      type: object
      required:
        [project_id, created_at, updated_at, blackout_periods, compliance_rules]
      properties:
        project_id:
          $ref: "#/components/schemas/UUID"
        blackout_periods:
          type: array
          items:
            $ref: "#/components/schemas/BlackoutPeriod"
          default: []
        compliance_rules:
          type: array
          items:
            $ref: "#/components/schemas/ComplianceRule"
          default: []
        created_at:
          $ref: "#/components/schemas/Timestamp"
        updated_at:
          $ref: "#/components/schemas/Timestamp"

    UpsertDeliveryPolicyRequest:
      type: object
      properties:
        blackout_periods:
          type: array
          items:
            $ref: "#/components/schemas/BlackoutPeriod"
          default: []
        compliance_rules:
          type: array
          items:
            $ref: "#/components/schemas/ComplianceRule"
          default: []

    # Health

    DependencyCheck:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
        message:
          type: string
          nullable: true

    HealthResponse:
      type: object
      required: [status, version, checks]
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
        version:
          type: string
          example: 0.1.0
        checks:
          type: object
          required: [postgres, redis, rabbitmq]
          properties:
            postgres:
              $ref: "#/components/schemas/DependencyCheck"
            redis:
              $ref: "#/components/schemas/DependencyCheck"
            rabbitmq:
              $ref: "#/components/schemas/DependencyCheck"
        timestamp:
          $ref: "#/components/schemas/Timestamp"
